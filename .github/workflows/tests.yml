name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run backend tests with coverage
        run: uv run --extra dev pytest --cov=app --cov-report=term-missing --cov-report=xml:coverage/backend-coverage.xml --cov-report=html:coverage/backend-html

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload backend coverage to Codecov
        id: codecov_backend
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/backend-coverage.xml
          flags: backend
          disable_search: true
          fail_ci_if_error: true

      - name: Upload frontend coverage to Codecov
        id: codecov_frontend
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/coverage/lcov.info
          flags: frontend
          disable_search: true
          fail_ci_if_error: true

      - name: Upload backend coverage HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: coverage/backend-html
          if-no-files-found: error

      - name: Upload frontend coverage HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-html
          path: frontend/coverage
          if-no-files-found: error

      - name: Coverage summary
        run: |
          {
            echo "## Coverage Reports"
            echo ""
            echo "| Component | Coverage file | Codecov upload | HTML artifact |"
            echo "|---|---|---|---|"
            echo "| Backend | \`coverage/backend-coverage.xml\` | ${{ steps.codecov_backend.outcome }} | backend-coverage-html |"
            echo "| Frontend | \`frontend/coverage/lcov.info\` | ${{ steps.codecov_frontend.outcome }} | frontend-coverage-html |"
          } >> "$GITHUB_STEP_SUMMARY"
